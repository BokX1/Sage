name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  merge_group:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test-matrix:
    name: Build and test (${{ matrix.node-version }})
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    uses: ./.github/workflows/_repo-node-gate.yml
    with:
      node-version: ${{ matrix.node-version }}
      run-command: npm run lint && npm run build && npm run test
      timeout-minutes: 20

  trust-gate:
    uses: ./.github/workflows/_repo-node-gate.yml
    with:
      node-version: 22.x
      run-command: npm run check:trust
      timeout-minutes: 35

  docs-lint:
    uses: ./.github/workflows/_repo-node-gate.yml
    with:
      node-version: 22.x
      run-command: npm run docs:lint
      timeout-minutes: 15

  docs-links:
    uses: ./.github/workflows/_repo-node-gate.yml
    with:
      node-version: 22.x
      run-command: npm run docs:links
      timeout-minutes: 20

  website-check:
    uses: ./.github/workflows/_repo-node-gate.yml
    with:
      node-version: 22.x
      working-directory: website
      cache-dependency-path: website/package-lock.json
      run-command: npm run check
      timeout-minutes: 20

  dependency-review:
    if: github.event_name == 'pull_request' && vars.ENABLE_DEPENDENCY_REVIEW == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
    - name: Check dependency graph status
      id: dependency-graph
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        response="$(curl -fsSL \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}")"
        dependency_graph_status="$(echo "${response}" | jq -r '.security_and_analysis.dependency_graph.status // "unknown"')"
        echo "status=${dependency_graph_status}" >> "${GITHUB_OUTPUT}"
        if [[ "${dependency_graph_status}" == "enabled" ]]; then
          echo "run_dependency_review=true" >> "${GITHUB_OUTPUT}"
          exit 0
        fi
        echo "run_dependency_review=false" >> "${GITHUB_OUTPUT}"
        echo "::notice::Skipping dependency review because Dependency Graph is not enabled (status=${dependency_graph_status})."

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      if: steps.dependency-graph.outputs.run_dependency_review == 'true'
      with:
        persist-credentials: false

    - name: Dependency review
      if: steps.dependency-graph.outputs.run_dependency_review == 'true'
      uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
